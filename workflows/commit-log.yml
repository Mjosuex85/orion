name: Log Agent Activity

on:
  push:
    branches: [develop, main]

jobs:
  log-activity:
    runs-on: ubuntu-latest
    # Solo corre si el commit tiene el formato de agente
    if: |
      startsWith(github.event.head_commit.message, '[NESTOR]') ||
      startsWith(github.event.head_commit.message, '[OLGA]') ||
      startsWith(github.event.head_commit.message, '[TESTER]') ||
      startsWith(github.event.head_commit.message, '[DEVOPS]') ||
      startsWith(github.event.head_commit.message, '[SEGURIDAD]')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract commit info
        id: extract
        run: |
          MSG="${{ github.event.head_commit.message }}"

          # Extraer agente (entre corchetes)
          AGENT=$(echo "$MSG" | grep -oP '(?<=\[)\w+(?=\])')

          # Extraer número de issue
          ISSUE=$(echo "$MSG" | grep -oP '(?<=#)\d+' | head -1)

          # Extraer talla
          SIZE=$(echo "$MSG" | grep -oP '(?<=size: )[SMLX]+')

          # Mapear talla a tokens estimados
          case $SIZE in
            S)  TOKENS=1000 ;;
            M)  TOKENS=3000 ;;
            L)  TOKENS=8000 ;;
            XL) TOKENS=15000 ;;
            *)  TOKENS=0 ;;
          esac

          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "tokens=$TOKENS" >> $GITHUB_OUTPUT
          echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Append to usage log
        run: |
          mkdir -p logs

          ENTRY="{\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"agent\": \"${{ steps.extract.outputs.agent }}\", \"issue\": \"${{ steps.extract.outputs.issue }}\", \"size\": \"${{ steps.extract.outputs.size }}\", \"tokens\": ${{ steps.extract.outputs.tokens }}, \"repo\": \"${{ steps.extract.outputs.repo }}\", \"commit\": \"${{ github.sha }}\"}"

          echo $ENTRY >> logs/usage.jsonl

      - name: Commit usage log
        run: |
          git config --local user.email "orion@orion-os.app"
          git config --local user.name "Orion OS"
          git add logs/usage.jsonl
          git diff --staged --quiet || git commit -m "[ORION] log: activity recorded | size: S"
          git push
